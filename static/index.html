<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Image Converter</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow"></p>
          <h1><svg class="ui-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6H6z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg><span data-i18n="title"></span></h1>
        </div>
        <div class="top-actions">
          <label class="language-switch">
            <svg class="ui-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <select id="languageSelect" aria-label="Language">
              <option value="zh">简体中文</option>
              <option value="zht">繁體中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <button id="healthButton" class="ghost-button" type="button">
            <svg class="ui-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span data-i18n="checkTools"></span>
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel upload-panel">
          <div class="panel-heading">
            <h2><svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><span data-i18n="input"></span></h2>
            <span id="fileCount" class="pill">0</span>
          </div>
          <label id="dropZone" class="drop-zone">
            <input id="fileInput" type="file" accept="application/pdf,.pdf" multiple />
            <span class="drop-icon">
              <svg class="ui-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </span>
            <strong data-i18n="dropTitle"></strong>
          </label>
          <div id="fileList" class="file-list"></div>
        </aside>

        <section class="panel preview-panel">
          <div class="panel-heading">
            <h2><svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span data-i18n="preview"></span></h2>
            <div class="preview-actions">
              <button id="prevPage" class="icon-button" type="button"><svg class="ui-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg></button>
              <span id="pageIndicator" class="page-indicator">-</span>
              <button id="nextPage" class="icon-button" type="button"><svg class="ui-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,6 15,12 9,18"/></svg></button>
            </div>
          </div>
          <div class="preview-grid">
            <div id="thumbnailRail" class="thumbnail-rail"></div>
            <div class="preview-canvas">
              <p id="emptyPreview" data-i18n="emptyPreview"></p>
            </div>
          </div>
        </section>

        <aside class="panel settings-panel">
          <div class="panel-heading">
            <h2><svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06c.5.5 1.2.67 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span data-i18n="settings"></span></h2>
          </div>

          <div class="field">
            <label data-i18n="format"></label>
            <div class="segmented" id="formatGroup">
              <button type="button" data-format="PNG" class="active">PNG</button>
              <button type="button" data-format="JPG">JPG</button>
              <button type="button" data-format="BMP">BMP</button>
            </div>
          </div>

          <div class="settings-card">
            <label class="field compact-field">
              <span>DPI</span>
              <input id="dpiInput" type="number" min="36" max="600" value="300" />
            </label>
          </div>

          <div id="jpgOptions" class="settings-card format-options hidden">
            <div class="option-title">
              <span data-i18n="jpgOptions"></span>
              <b id="qualityValue">90</b>
            </div>
            <input id="qualityInput" type="range" min="1" max="100" value="90" />
          </div>

          <div id="bmpOptions" class="settings-card format-options hidden">
            <label class="field">
              <span data-i18n="bmpDepth"></span>
              <select id="bmpDepth">
                <option>1-bit</option>
                <option>8-bit grayscale</option>
                <option selected>24-bit RGB</option>
                <option>32-bit RGBA</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span data-i18n="pageRange"></span>
            <input id="pageRangeInput" type="text" placeholder="1,3,5-8" />
          </label>

          <div class="field">
            <span data-i18n="template"></span>
            <select id="templatePreset"></select>
            <div id="templateExample" class="template-example">
              <p id="templateDesc"></p>
              <p id="templateSample" class="template-sample"></p>
            </div>
            <div id="customTemplateRow" class="custom-template hidden">
              <input id="templateInput" type="text" value="{page}" placeholder="{pdf_stem}_{page}" />
              <div class="token-row">
                <button type="button" data-token="{page}" data-i18n="tokenPage"></button>
                <button type="button" data-token="{global}" data-i18n="tokenGlobal"></button>
                <button type="button" data-token="{pdf_stem}" data-i18n="tokenPdfStem"></button>
                <button type="button" data-token="{pdf_index}" data-i18n="tokenPdfIndex"></button>
              </div>
            </div>
          </div>

          <div class="field">
            <label data-i18n="mode"></label>
            <div class="mode-stack">
              <label><input type="radio" name="exportMode" value="separate" checked /> <span data-i18n="separate"></span></label>
              <label><input type="radio" name="exportMode" value="merge" /> <span data-i18n="merge"></span></label>
            </div>
          </div>

          <button id="exportButton" class="primary-button" type="button">
            <svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="export"></span>
          </button>
          <div id="exportProgress" class="export-progress hidden">
            <div class="progress-track"><div id="exportProgressBar"></div></div>
            <div id="exportProgressMeta" class="progress-meta"></div>
          </div>
          <p id="statusText" class="status hidden"></p>
        </aside>
      </section>

      <footer class="app-footer" data-i18n="copyright"></footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
